services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - RAG_VECTORSTORE__PERSIST_DIRECTORY=/app/chroma_data
    volumes:
      - uploads_data:/app/uploads
      - chroma_data:/app/chroma_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  uploads_data:
  chroma_data:
